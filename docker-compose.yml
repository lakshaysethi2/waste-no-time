services:
  web:
    build:
      context: .
      args:
        VITE_TELEGRAM_BOT_USERNAME: ${VITE_TELEGRAM_BOT_USERNAME:?Set VITE_TELEGRAM_BOT_USERNAME in .env.local}
    container_name: waste-no-time
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    restart: unless-stopped
