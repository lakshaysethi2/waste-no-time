services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - TELEGRAM_BOT_API_KEY=${TELEGRAM_BOT_API_KEY:-123456:test}
    command: python manage.py runserver 0.0.0.0:8000
  bot:
    build: .
    volumes:
      - .:/app
    environment:
      - TELEGRAM_BOT_API_KEY=${TELEGRAM_BOT_API_KEY:-123456:test}
    command: python manage.py run_bot
